<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Style Guide Action</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">Markdown Style Guide Action</h1>
        <p class="text-lg text-gray-600 mb-6">Automate your markdown consistency with a powerful GitHub Action.</p>
        <p class="text-md text-gray-700 mb-8">Ensure professional-looking documentation and guides across your repositories. Define your rules, and let our action do the rest!</p>
        <a href="#" id="checkoutButton" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-full text-lg transition duration-300">
            Get it Now for $9.99
        </a>
        <p class="text-sm text-gray-500 mt-4">One-time purchase, unlimited repositories.</p>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('pk_test_TYooMQauvdEDq54NiTGBzqjp'); // Replace with your public key
        const checkoutButton = document.getElementById('checkoutButton');

        checkoutButton.addEventListener('click', async () => {
            const { error } = await stripe.redirectToCheckout({
                lineItems: [{ price: 'price_12345', quantity: 1 }], // Replace with your Stripe Price ID
                mode: 'payment',
                successUrl: window.location.origin + '/success.html',
                cancelUrl: window.location.origin + '/cancel.html',
            });

            if (error) {
                console.error('Stripe Checkout Error:', error);
            }
        });
    </script>
</body>
</html>
